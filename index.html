<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double+Ink:wght@100..900&family=Playwrite+DK+Uloopet+Guides&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto:ital,wght@0,100..900;1,100..900&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&family=Supermercado+One&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="src/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
    <title>Atmospheric Conditions App</title>
  </head>

  <body>
    <div class="weather-app">
      <header>
        <form class="search-form" id="search-form">
          <input
            type="search"
            placeholder="Input a city.."
            required
            id="search-form-input"
            class="search-form-input"
          />
          <input type="submit" value="Search" class="search-form-button" />
        </form>
      </header>
      <main>
        <div class="weather-app-data">
          <div>
            <h1 class="weather-app-city" id="city">Shepherd</h1>
            <p class="weather-app-details">
              Tuesday 19:52, mostly cloudy
              <br />
              Humidity: <strong>28%</strong> Wind: <strong>12m/h</strong>
            </p>
          </div>
          <div class="weather-app-temperature-container">
            <div class="weather-app-icon">🌥️</div>
            <div class="weather-app-temperature">58</div>
            <div class="weather-app-unit">℉</div>
          </div>
        </div>
      </main>

      <footer>
        This project was coded by
        <a href="https://github.com/harrellnichcol" target="blank"
          >Nichcol Harrell</a
        >
        code
        <a
          href="https://github.com/harrellnichcol/Atmospheric-Conditions-App"
          target="blank"
        >
          open-sourced on GitHub
        </a>
        and website
        <a
          href="https://atmospheric-conditions-app-nh.netlify.app/"
          target="blank"
          >hosted on Netlify</a
        >
      </footer>
    </div>
    <script src="src/index.js"></script>
  </body>
</html>
